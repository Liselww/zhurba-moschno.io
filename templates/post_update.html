{% extends 'base.html' %}

{% block title %}Редагувати пост{% endblock %}

{% block body %}
<div class="container mt-5">
    <h1>Редагувати пост</h1>
    
    <div class="card">
        <div class="card-header bg-success text-white">
            <h5 class="mb-0">Редагування: {{ article.title }}</h5>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label for="title" class="form-label">Назва статті</label>
                    <input type="text" class="form-control" id="title" name="title" value="{{ article.title }}" required>
                </div>
                <div class="mb-3">
                    <label for="intro" class="form-label">Короткий опис</label>
                    <input type="text" class="form-control" id="intro" name="intro" value="{{ article.intro }}" required>
                </div>
                <div class="mb-3">
                    <label for="text" class="form-label">Текст статті</label>
                    <textarea class="form-control" id="text" name="text" rows="10" required>{{ article.text }}</textarea>
                </div>
                <button type="submit" class="btn btn-success">Зберегти зміни</button>
                <a href="{{ url_for('post_detail', id=article.id) }}" class="btn btn-secondary">Скасувати</a>
            </form>
        </div>
    </div>
</div>
{% endblock %}
