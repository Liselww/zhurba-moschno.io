{% extends 'base.html' %}

{% block title %}Журба Пісні{% endblock %}

{% block body %}
<div class="container mt-5">
    <h1 class="mb-4">
        <i class="bi bi-music-note-beamed"></i> 
        Журба Пісні
    </h1>
    
    <div class="row">
        <!-- Пісня 1 -->
        <div class="col-md-4 mb-4">
            <div class="card h-100 shadow">
                <div class="card-header bg-success text-white">
                    <h5 class="mb-0">
                        <i class="bi bi-music-note"></i> 
                        Журба Пісня 1
                    </h5>
                </div>
                <div class="card-body text-center">
                    <img src="{{ url_for('static', filename='images/music-placeholder.jpg') }}" 
                         class="img-fluid rounded mb-3" 
                         style="max-height: 150px;"
                         onerror="this.style.display='none'">
                    
                    <audio controls class="w-100 mb-3">
                        <source src="{{ url_for('static', filename='music/zhurba_song.mp3') }}" type="audio/mpeg">
                        Ваш браузер не підтримує аудіо
                    </audio>
                    
                    <div class="d-grid">
                        <a href="{{ url_for('download_song', song_id=1) }}" 
                           class="btn btn-success">
                            <i class="bi bi-download"></i> Завантажити
                        </a>
                    </div>
                    
                    <small class="text-muted mt-2 d-block">
                        <i class="bi bi-file-earmark-music"></i> MP3 • 3.5 MB
                    </small>
                </div>
            </div>
        </div>
        
        <!-- Пісня 2 -->
        <div class="col-md-4 mb-4">
            <div class="card h-100 shadow">
                <div class="card-header bg-primary text-white">
                    <h5 class="mb-0">
                        <i class="bi bi-music-note"></i> 
                        Журба Пісня 2
                    </h5>
                </div>
                <div class="card-body text-center">
                    <img src="{{ url_for('static', filename='images/music-placeholder.jpg') }}" 
                         class="img-fluid rounded mb-3" 
                         style="max-height: 150px;"
                         onerror="this.style.display='none'">
                    
                    <audio controls class="w-100 mb-3">
                        <source src="{{ url_for('static', filename='music/zhurba_song2.mp3') }}" type="audio/mpeg">
                        Ваш браузер не підтримує аудіо
                    </audio>
                    
                    <div class="d-grid">
                        <a href="{{ url_for('download_song', song_id=2) }}" 
                           class="btn btn-primary">
                            <i class="bi bi-download"></i> Завантажити
                        </a>
                    </div>
                    
                    <small class="text-muted mt-2 d-block">
                        <i class="bi bi-file-earmark-music"></i> MP3 • 4.2 MB
                    </small>
                </div>
            </div>
        </div>
        
        <!-- Пісня 3 -->
        <div class="col-md-4 mb-4">
            <div class="card h-100 shadow">
                <div class="card-header bg-warning text-dark">
                    <h5 class="mb-0">
                        <i class="bi bi-music-note"></i> 
                        Журба Пісня 3
                    </h5>
                </div>
                <div class="card-body text-center">
                    <img src="{{ url_for('static', filename='images/music-placeholder.jpg') }}" 
                         class="img-fluid rounded mb-3" 
                         style="max-height: 150px;"
                         onerror="this.style.display='none'">
                    
                    <audio controls class="w-100 mb-3">
                        <source src="{{ url_for('static', filename='music/zhurba_song3.mp3') }}" type="audio/mpeg">
                        Ваш браузер не підтримує аудіо
                    </audio>
                    
                    <div class="d-grid">
                        <a href="{{ url_for('download_song', song_id=3) }}" 
                           class="btn btn-warning text-dark">
                            <i class="bi bi-download"></i> Завантажити
                        </a>
                    </div>
                    
                    <small class="text-muted mt-2 d-block">
                        <i class="bi bi-file-earmark-music"></i> MP3 • 5.1 MB
                    </small>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Кнопка назад -->
    <div class="mt-4 text-center">
        <a href="{{ url_for('index') }}" class="btn btn-secondary">
            <i class="bi bi-arrow-left"></i> На головну
        </a>
    </div>
</div>

<!-- Додайте CSS для краси -->
<style>
    .card {
        transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover {
        transform: translateY(-5px);
        box-shadow: 0 0.5rem 1rem rgba(0,0,0,0.15) !important;
    }
    audio {
        height: 40px;
    }
</style>
{% endblock %}
